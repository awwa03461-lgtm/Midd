<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lily in Danger - Web Arcade</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #5dade2; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 2px solid #34495e;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #score-board {
            background-color: #d35400;
            color: white;
            padding: 10px 30px;
            margin-top: 20px;
            border-radius: 10px;
            border: 4px solid #a04000;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            pointer-events: auto;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #f1c40f;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui-layer">
            <div id="score-board">SCORE<br><span id="score">0</span></div>
            <div id="game-over">
                <h2>Game Over!</h2>
                <p>امتیاز شما: <span id="final-score">0</span></p>
                <button onclick="resetGame()">دوباره بازی کن</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        // === لود کردن عکس شخصیت ===
        const playerImg = new Image();
        playerImg.src = 'zz.png'; 

        // === لود کردن عکس سکو (سنگ) ===
        const platformImg = new Image();
        // اسم عکسی که آپلود کردید را اینجا قرار دادم
        platformImg.src = 'vv.JPG'; 

        let score = 0;
        let gameFrame = 0;
        let isGameOver = false;
        let difficulty = 1;

        const platforms = [
            { x: 10, y: canvas.height - 60, width: 80, height: 60 },
            { x: 160, y: canvas.height - 60, width: 80, height: 60 },
            { x: 310, y: canvas.height - 60, width: 80, height: 60 }
        ];

        const playerWidth = 50;
        const playerHeight = 80;

        const player = {
            x: 180,
            width: playerWidth,
            height: playerHeight,
            y: canvas.height - 60 - playerHeight, 
            color: '#ff9ff3',
            targetX: 180,
            speed: 6,
            vy: 0,
            gravity: 0.8,
            jumpPower: 14,
            isGrounded: true,
            facingRight: true 
        };

        let boxes = [];

        canvas.addEventListener('mousedown', jumpAndMove);
        canvas.addEventListener('touchstart', jumpAndMove);

        function jumpAndMove(e) {
            if (isGameOver) return;
            
            let rect = canvas.getBoundingClientRect();
            let clientX = e.touches ? e.touches[0].clientX : e.clientX;
            let clickX = clientX - rect.left;
            
            player.targetX = clickX - player.width / 2;
            if (player.targetX < 0) player.targetX = 0;
            if (player.targetX > canvas.width - player.width) player.targetX = canvas.width - player.width;

            if (player.isGrounded) {
                player.vy = -player.jumpPower;
                player.isGrounded = false;
            }
        }

        class Box {
            constructor() {
                this.width = 35;
                this.height = 35;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = Math.random() * 1.5 + (1.2 * difficulty);
                this.color = '#7f8c8d';
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.strokeStyle = '#2c3e50';
                ctx.lineWidth = 2;
                ctx.strokeRect(this.x, this.y, this.width, this.height);
                ctx.beginPath();
                ctx.moveTo(this.x, this.y + 8);
                ctx.lineTo(this.x + this.width, this.y + 8);
                ctx.stroke();
            }
        }

        function drawEnvironment() {
            ctx.fillStyle = '#2980b9'; 
            ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            
            for (let plat of platforms) {
                // === رسم سکوها با استفاده از عکس ===
                if (platformImg.complete && platformImg.naturalHeight !== 0) {
                    // اگر عکس با موفقیت لود شده بود، عکس سنگ را بکش
                    ctx.drawImage(platformImg, plat.x, plat.y, plat.width, plat.height);
                } else {
                    // اگر عکس پیدا نشد (حالت پشتیبان)، همان رنگ قبلی را بکش
                    ctx.fillStyle = '#e67e22';
                    ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                    
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(plat.x, plat.y, plat.width, 10);
                    
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
                }
            }
        }

        function checkCollision(rect1, rect2) {
            let offset = 5; 
            return (
                rect1.x + offset < rect2.x + rect2.width &&
                rect1.x + rect1.width - offset > rect2.x &&
                rect1.y + offset < rect2.y + rect2.height &&
                rect1.y + rect1.height - offset > rect2.y
            );
        }

        function handleBoxes() {
            let spawnRate = Math.max(45, 100 - Math.floor(score / 20)); 
            
            if (gameFrame % spawnRate === 0) {
                boxes.push(new Box());
            }

            for (let i = 0; i < boxes.length; i++) {
                boxes[i].update();
                boxes[i].draw();

                if (checkCollision(player, boxes[i])) {
                    isGameOver = true;
                }

                if (boxes[i].y > canvas.height) {
                    boxes.splice(i, 1);
                    score += 10;
                    scoreElement.innerText = score;
                    i--;
                    if (score % 150 === 0) difficulty += 0.3;
                }
            }
        }

        function updatePlayer() {
            let dx = player.targetX - player.x;
            if (Math.abs(dx) > player.speed) {
                player.x += (dx > 0 ? player.speed : -player.speed);
                player.facingRight = dx > 0;
            } else {
                player.x = player.targetX;
            }

            player.vy += player.gravity;
            player.y += player.vy;
            player.isGrounded = false;

            if (player.vy >= 0) {
                for (let plat of platforms) {
                    if (player.x < plat.x + plat.width && 
                        player.x + player.width > plat.x && 
                        player.y + player.height >= plat.y && 
                        player.y + player.height <= plat.y + player.vy + 2) {
                        
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                    }
                }
            }

            if (player.y > canvas.height) {
                isGameOver = true;
            }

            if (playerImg.complete && playerImg.naturalHeight !== 0) {
                ctx.save(); 
                
                let bobbing = 0;
                let stretchY = 1;
                
                if (player.isGrounded) {
                    if (Math.abs(dx) > player.speed) {
                        bobbing = Math.sin(gameFrame * 0.5) * 5;
                    } else {
                        bobbing = Math.sin(gameFrame * 0.1) * 2;
                        stretchY = 1 + Math.sin(gameFrame * 0.1) * 0.03; 
                    }
                }

                let centerX = player.x + player.width / 2;
                let drawY = player.y + bobbing;

                ctx.translate(centerX, drawY + player.height); 

                if (!player.facingRight) {
                    ctx.scale(-1, stretchY);
                } else {
                    ctx.scale(1, stretchY);
                }

                ctx.drawImage(playerImg, -player.width / 2, -player.height, player.width, player.height);
                
                ctx.restore(); 
            } else {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
        }

        function animate() {
            if (isGameOver) {
                finalScoreElement.innerText = score;
                gameOverScreen.style.display = 'block';
                return;
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            drawEnvironment();
            updatePlayer();
            handleBoxes();
            
            gameFrame++;
            requestAnimationFrame(animate);
        }

        function resetGame() {
            score = 0;
            difficulty = 1;
            gameFrame = 0;
            boxes = [];
            isGameOver = false;
            
            player.x = 180;
            player.y = canvas.height - 60 - player.height; 
            player.targetX = 180;
            player.vy = 0;
            player.facingRight = true;
            
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            animate();
        }

        // بررسی لود شدن هر دو عکس قبل از شروع
        let imagesLoaded = 0;
        function checkImages() {
            imagesLoaded++;
            if(imagesLoaded >= 2) {
                animate();
            }
        }

        playerImg.onload = checkImages;
        playerImg.onerror = checkImages;
        platformImg.onload = checkImages;
        platformImg.onerror = checkImages;

    </script>
</body>
</html>
