<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seismic Arcade Game</title>
    <style>
        body { margin: 0; padding: 0; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #game-container { position: relative; width: 400px; height: 600px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); border: 2px solid #34495e; overflow: hidden; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; }
        #score-board { background-color: #d35400; color: white; padding: 10px 30px; margin-top: 20px; border-radius: 10px; border: 4px solid #a04000; font-size: 24px; font-weight: bold; text-align: center; }
        #game-over { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.8); color: white; padding: 20px; text-align: center; border-radius: 10px; pointer-events: auto; }
        button { margin-top: 15px; padding: 10px 20px; font-size: 16px; cursor: pointer; background-color: #f1c40f; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="ui-layer">
            <div id="score-board">SCORE<br><span id="score">0</span></div>
            <div id="game-over">
                <h2>Game Over!</h2>
                <p>Your Score: <span id="final-score">0</span></p>
                <button onclick="resetGame()">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        const bgImg = new Image(); bgImg.src = 'gg.png';
        const playerImg = new Image(); playerImg.src = 'nn.png';
        const platformImg = new Image(); platformImg.src = 'vv.JPG';
        const boxImg = new Image(); boxImg.src = 'rr.png';
        const planeImg = new Image(); planeImg.src = 'tt.png'; 

        const bonusBoxImg = new Image();
        bonusBoxImg.src = 'oo.png'; 

        let score = 0;
        let gameFrame = 0;
        let isGameOver = false;
        let difficulty = 1;

        const platforms = [
            { x: 10, y: canvas.height - 60, width: 80, height: 60 },
            { x: 160, y: canvas.height - 60, width: 80, height: 60 },
            { x: 310, y: canvas.height - 60, width: 80, height: 60 }
        ];

        const player = {
            x: 180, width: 70, height: 80,
            y: canvas.height - 60 - 70,
            color: '#ff9ff3', targetX: 180, speed: 6, vy: 0, gravity: 0.8, jumpPower: 10, isGrounded: true, facingRight: true 
        };

        let boxes = [];
        let bonusBoxes = []; 
        let plane = null;

        class Airplane {
            constructor() {
                this.width = 560; 
                this.height = 150;
                this.x = -this.width - 50; 
                this.y = 150; 
                this.speed = 2;
            }
            update() { this.x += this.speed; }
            draw() {
                if (planeImg.complete && planeImg.naturalHeight !== 0) {
                    ctx.drawImage(planeImg, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = 'red';
                    ctx.fillText('Loading plane...', this.x + 60, this.y + 30);
                }
            }
        }

        class Box {
            constructor() {
                this.width = 45; this.height = 45;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = Math.random() * 1.5 + (1.2 * difficulty);
                this.pulseOffset = Math.random() * Math.PI * 2; 
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.save();
                ctx.globalAlpha = 0.65 + Math.sin(gameFrame * 0.1 + this.pulseOffset) * 0.35;
                if (boxImg.complete && boxImg.naturalHeight !== 0) {
                    ctx.drawImage(boxImg, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#7f8c8d'; ctx.fillRect(this.x, this.y, this.width, this.height);
                }
                ctx.restore();
            }
        }

        class BonusBox {
            constructor() {
                this.width = 65; 
                this.height = 65;
                this.x = Math.random() * (canvas.width - this.width);
                this.y = -this.height;
                this.speed = Math.random() * 1.5 + 1.5; 
                this.pulseOffset = Math.random() * Math.PI * 2; 
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.save();
                ctx.globalAlpha = 0.8 + Math.sin(gameFrame * 0.15 + this.pulseOffset) * 0.2;
                if (bonusBoxImg.complete && bonusBoxImg.naturalHeight !== 0) {
                    ctx.drawImage(bonusBoxImg, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#f1c40f'; 
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                    ctx.strokeStyle = '#f39c12';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(this.x, this.y, this.width, this.height);
                }
                ctx.restore();
            }
        }

        canvas.addEventListener('mousedown', jumpAndMove);
        canvas.addEventListener('touchstart', jumpAndMove);

        function jumpAndMove(e) {
            if (isGameOver) return;
            let rect = canvas.getBoundingClientRect();
            let clickX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            player.targetX = clickX - player.width / 2;
            if (player.isGrounded) { player.vy = -player.jumpPower; player.isGrounded = false; }
        }

        function handlePlane() {
            if (gameFrame === 1 || gameFrame % (20 * 60) === 0) {
                plane = new Airplane();
            }
            if (plane) {
                plane.update();
                plane.draw();
                if (plane.x > canvas.width + 100) plane = null;
            }
        }

        function drawEnvironment() {
            if (bgImg.complete && bgImg.naturalHeight !== 0) { ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height); }
            else { ctx.fillStyle = '#5dade2'; ctx.fillRect(0, 0, canvas.width, canvas.height); }
            ctx.fillStyle = '#2980b9'; ctx.fillRect(0, canvas.height - 40, canvas.width, 40);
            for (let plat of platforms) {
                if (platformImg.complete && platformImg.naturalHeight !== 0) { ctx.drawImage(platformImg, plat.x, plat.y, plat.width, plat.height); }
                else { ctx.fillStyle = '#e67e22'; ctx.fillRect(plat.x, plat.y, plat.width, plat.height); }
            }
        }

        function handleBoxes() {
            let spawnRate = Math.max(45, 100 - Math.floor(score / 20)); 
            if (gameFrame % spawnRate === 0) boxes.push(new Box());
            for (let i = 0; i < boxes.length; i++) {
                boxes[i].update(); boxes[i].draw();
                
                if (checkCollision(player, boxes[i])) {
                    isGameOver = true;
                }

                if (boxes[i] && boxes[i].y > canvas.height) { 
                    boxes.splice(i, 1); 
                    score += 10; 
                    scoreElement.innerText = score; 
                    i--; 
                    if (score % 150 === 0) difficulty += 0.3; 
                }
            }
        }

        function handleBonusBoxes() {
            if (gameFrame === 1 || gameFrame % (20 * 60) === 0) {
                bonusBoxes.push(new BonusBox());
            }

            for (let i = 0; i < bonusBoxes.length; i++) {
                bonusBoxes[i].update(); 
                bonusBoxes[i].draw();

                if (checkCollision(player, bonusBoxes[i])) {
                    score += 50;
                    scoreElement.innerText = score;
                    bonusBoxes.splice(i, 1); 
                    i--;
                    continue; 
                }

                if (bonusBoxes[i] && bonusBoxes[i].y > canvas.height) {
                    bonusBoxes.splice(i, 1);
                    i--;
                }
            }
        }

        function checkCollision(r1, r2) {
            return (r1.x+5 < r2.x+r2.width && r1.x+r1.width-5 > r2.x && r1.y+5 < r2.y+r2.height && r1.y+r1.height-5 > r2.y);
        }

        function updatePlayer() {
            let dx = player.targetX - player.x;
            if (Math.abs(dx) > player.speed) { player.x += (dx > 0 ? player.speed : -player.speed); player.facingRight = dx > 0; }
            else { player.x = player.targetX; }
            player.vy += player.gravity; player.y += player.vy; player.isGrounded = false;
            if (player.vy >= 0) {
                for (let plat of platforms) {
                    if (player.x < plat.x + plat.width && player.x + player.width > plat.x && player.y + player.height >= plat.y && player.y + player.height <= plat.y + player.vy + 2) {
                        player.y = plat.y - player.height; player.vy = 0; player.isGrounded = true;
                    }
                }
            }
            if (player.y > canvas.height) isGameOver = true;

            if (playerImg.complete && playerImg.naturalHeight !== 0) {
                ctx.save();
                let bobbing = player.isGrounded ? (Math.abs(dx) > player.speed ? Math.sin(gameFrame * 0.5) * 5 : Math.sin(gameFrame * 0.1) * 2) : 0;
                ctx.translate(player.x + player.width/2, player.y + bobbing + player.height);
                ctx.scale(player.facingRight ? 1 : -1, 1);
                ctx.drawImage(playerImg, -player.width/2, -player.height, player.width, player.height);
                ctx.restore();
            }
        }

        function animate() {
            if (isGameOver) { finalScoreElement.innerText = score; gameOverScreen.style.display = 'block'; return; }
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            drawEnvironment();
            handlePlane();
            updatePlayer();
            handleBoxes();
            handleBonusBoxes(); // 
            gameFrame++;
            requestAnimationFrame(animate);
        }

        function resetGame() {
            score = 0; difficulty = 1; gameFrame = 0; boxes = []; bonusBoxes = []; plane = null; isGameOver = false;
            player.x = 180; player.y = canvas.height - 60 - player.height; player.targetX = 180; player.vy = 0;
            scoreElement.innerText = score; gameOverScreen.style.display = 'none'; animate();
        }

        let imagesLoaded = 0;
        function checkImages() {
            imagesLoaded++;
            if(imagesLoaded >= 6) {
                animate();
            }
        }

        playerImg.onload = checkImages; playerImg.onerror = checkImages;
        platformImg.onload = checkImages; platformImg.onerror = checkImages;
        boxImg.onload = checkImages; boxImg.onerror = checkImages;
        bgImg.onload = checkImages; bgImg.onerror = checkImages;
        planeImg.onload = checkImages; planeImg.onerror = checkImages;
        bonusBoxImg.onload = checkImages; bonusBoxImg.onerror = checkImages;

    </script>
</body>
</html>
